# FluxKart Nginx Load Balancer Configuration
#
# Tuned for 10,000 concurrent users in flash sale scenarios.

worker_processes auto;             # One worker per CPU core
worker_rlimit_nofile 65535;        # Max open files per worker

events {
    worker_connections 65535;      # Max connections per worker
    use epoll;                     # Most efficient I/O model on Linux
    multi_accept on;               # Accept all new connections at once
}

http {

    # ── Performance Tuning ────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  10000;
    reset_timedout_connection on;
    client_max_body_size 10m;

    # ── Upstream: FastAPI Instances ───────────────────────────────────────────
    upstream fluxkart_api {
        least_conn;
        server api1:8000 max_fails=3 fail_timeout=30s;
        server api2:8000 max_fails=3 fail_timeout=30s;
        keepalive 512;
    }

    # ── Rate Limiting at Nginx Level ──────────────────────────────────────────
    # 500 requests per second per IP — high enough for load test
    # Per-user rate limiting handled in FastAPI middleware
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=500r/s;

    # ── Main Server Block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Logging ───────────────────────────────────────────────────────────
        access_log off;
        error_log  /var/log/nginx/error.log warn;

        # ── Timeouts ──────────────────────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # ── SSE: Queue Stream ─────────────────────────────────────────────────
        location /api/reservations/queue-stream {
            proxy_pass         http://fluxkart_api;
            proxy_http_version 1.1;

            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   Host             $host;
            proxy_set_header   Connection       "";

            proxy_buffering           off;
            proxy_cache               off;
            proxy_read_timeout        3600s;
            proxy_send_timeout        3600s;
            chunked_transfer_encoding on;

            add_header X-Accel-Buffering no;
        }

        # ── API Routes ────────────────────────────────────────────────────────
        location / {

            proxy_pass         http://fluxkart_api;
            proxy_http_version 1.1;

            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   Host             $host;
            proxy_set_header   Connection       "";
            proxy_set_header   Upgrade          $http_upgrade;
        }

        # ── Health Check — bypass rate limiting ───────────────────────────────
        location /health {
            proxy_pass         http://fluxkart_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";
            access_log off;
        }

        # ── Metrics ───────────────────────────────────────────────────────────
        location /metrics {
            proxy_pass         http://fluxkart_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";
        }
    }
}