networks:
  fluxkart_network:
    driver: bridge

services:

  redis:
    image: redis:7-alpine
    container_name: fluxkart_redis
    networks:
      - fluxkart_network
    ports:
      - "6379:6379"
    command: redis-server --appendonly no --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: fluxkart_pgbouncer
    networks:
      - fluxkart_network
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=${POSTGRES_PORT}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=10000
      - DEFAULT_POOL_SIZE=90
      - AUTH_TYPE=plain
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: fluxkart_rabbitmq
    networks:
      - fluxkart_network
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 30s

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxkart_api1
    networks:
      - fluxkart_network
    environment:
      - APP_ENV=${APP_ENV}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      - RESERVATION_TTL_SECONDS=${RESERVATION_TTL_SECONDS}
      - JAEGER_OTLP_ENDPOINT=${JAEGER_OTLP_ENDPOINT:-http://jaeger:4317}
      - OTEL_SERVICE_NAME=fluxkart-api
    sysctls:
      - net.core.somaxconn=65535
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxkart_api2
    networks:
      - fluxkart_network
    environment:
      - APP_ENV=${APP_ENV}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      - RESERVATION_TTL_SECONDS=${RESERVATION_TTL_SECONDS}
      - JAEGER_OTLP_ENDPOINT=${JAEGER_OTLP_ENDPOINT:-http://jaeger:4317}
      - OTEL_SERVICE_NAME=fluxkart-api
    sysctls:
      - net.core.somaxconn=65535
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxkart_consumer
    networks:
      - fluxkart_network
    command: ["python", "consumers/run_consumer.py"]
    environment:
      - APP_ENV=${APP_ENV}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JAEGER_OTLP_ENDPOINT=${JAEGER_OTLP_ENDPOINT:-http://jaeger:4317}
      - OTEL_SERVICE_NAME=fluxkart-consumer
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: fluxkart_nginx
    networks:
      - fluxkart_network
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    sysctls:
      - net.core.somaxconn=65535
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - api1
      - api2

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: fluxkart_jaeger
    networks:
      - fluxkart_network
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:latest
    container_name: fluxkart_prometheus
    networks:
      - fluxkart_network
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: fluxkart_grafana
    networks:
      - fluxkart_network
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana

  k6:
    image: grafana/k6:latest
    container_name: fluxkart_k6
    networks:
      - fluxkart_network
    volumes:
      - ./load_test.js:/scripts/load_test.js
      - ./scripts/tokens.json:/scripts/tokens.json
    environment:
      - BASE_URL=http://nginx
    profiles:
      - loadtest
    depends_on:
      - nginx

volumes:
  rabbitmq_data:
  prometheus_data:
  grafana_data: