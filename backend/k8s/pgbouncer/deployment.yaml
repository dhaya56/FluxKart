# PgBouncer — connection pooler in front of PostgreSQL
#
# NOTE: In minikube, PostgreSQL runs on your host machine (Windows).
# PgBouncer connects to host.minikube.internal (192.168.65.254)
# which resolves automatically inside minikube — no hostAliases needed.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: fluxkart
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 5432
          env:
            - name: DB_HOST
              value: "host.minikube.internal"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "fluxkart_db"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fluxkart-secrets
                  key: postgres-password
            - name: POOL_MODE
              value: "transaction"
            - name: MAX_CLIENT_CONN
              value: "10000"
            - name: DEFAULT_POOL_SIZE
              value: "90"
            - name: AUTH_TYPE
              value: "plain"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-service
  namespace: fluxkart
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 5432
      targetPort: 5432