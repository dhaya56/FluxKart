# Kubernetes Secrets — base64 encoded values
# In production: use AWS Secrets Manager, Vault, or Sealed Secrets
# For local minikube: plain base64 is fine
#
# To encode a value:
#   echo -n "your-value" | base64
#
# Current values (base64 encoded):
#   postgres password: 123          → MTIz
#   jwt secret:        fluxkart-super-secret-key-change-in-production → (encoded below)
#   rabbitmq password: fluxkart123  → Zmx1eGthcnQxMjM=

apiVersion: v1
kind: Secret
metadata:
  name: fluxkart-secrets
  namespace: fluxkart
type: Opaque
data:
  postgres-password: MTIz
  jwt-secret-key: Zmx1eGthcnQtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==
  rabbitmq-password: Zmx1eGthcnQxMjM=