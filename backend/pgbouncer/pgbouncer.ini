[databases]
; Route all connections to PostgreSQL
fluxkart_db = host=host.docker.internal port=5432 dbname=fluxkart_db

[pgbouncer]
; ── Connection Settings ───────────────────────────────────────────────────────
listen_addr     = 0.0.0.0
listen_port     = 5432

; ── Pooling Mode ──────────────────────────────────────────────────────────────
; transaction mode: connection returned to pool after each transaction
; This is the most efficient mode — allows 10,000 app connections
; to share just 100 PostgreSQL connections
pool_mode       = transaction

; ── Pool Size ─────────────────────────────────────────────────────────────────
; Max connections PgBouncer opens to PostgreSQL
max_client_conn = 10000    ; Max app connections accepted
default_pool_size = 90     ; Connections to PostgreSQL per database/user pair
reserve_pool_size = 10     ; Emergency reserve connections
reserve_pool_timeout = 5   ; Seconds before using reserve pool

; ── Auth ──────────────────────────────────────────────────────────────────────
auth_type       = md5
auth_file       = /etc/pgbouncer/userlist.txt

; ── Logging ───────────────────────────────────────────────────────────────────
log_connections = 0        ; Don't log every connection — too noisy under load
log_disconnections = 0
log_pooler_errors = 1      ; Log errors only

; ── Timeouts ─────────────────────────────────────────────────────────────────
server_idle_timeout   = 600
client_idle_timeout   = 0
query_timeout         = 30
client_login_timeout  = 10

; ── Admin ─────────────────────────────────────────────────────────────────────
admin_users = postgres
stats_users = postgres